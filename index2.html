<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"></script>
  <title>Document Printout</title>
  <style>
    body {
      font-family: 'Thonburi', 'Noto Sans Thai', 'Tahoma', sans-serif;
      margin: 0;
      padding: 16px;
      font-size: 13px;
      line-height: 1.35;
      -webkit-text-size-adjust: 100%;
    }

    .title {
      font-size: 26px;
      font-weight: bold;
      color: red;
      text-align: center;
      margin-bottom: 4px;
      line-height: 1.35;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .header-left { font-size: 12px; color: #555; }
    .header-right { font-size: 15px; font-weight: bold; color: #000; }

    .field { margin-bottom: 8px; }
    .label { font-size: 11px; color: #333; }
    .value { font-size: 18px; font-weight: bold; }
    .value-sm { font-size: 13px; }
    .value-lg { font-size: 22px; font-weight: bold; }

    .row-2col {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
    }
    .row-2col > div { flex: 1; }

    .date-value {
      font-size: 26px;
      font-weight: bold;
      color: red;
    }

    .indent { padding-left: 20px; }
    @media print {
      @page {
        size: A6 portrait;
        margin: 3mm;
      }

      html,
      body {
        width: 100%;
        height: auto;
      }

      body {
        margin: 0 !important;
        padding: 0 !important;
        font-size: 12px;
        line-height: 1.3;
      }

      .container {
        max-width: 100% !important;
        width: 100% !important;
        padding: 0 1mm !important;
      }

      .title {
        font-size: 20px;
        margin-bottom: 2px;
        line-height: 1.35;
      }

      .header-row {
        margin-bottom: 6px;
      }

      .header-left {
        font-size: 11px;
      }

      .header-right {
        font-size: 13px;
      }

      .field {
        margin-bottom: 5px;
      }

      .label {
        font-size: 10px;
        line-height: 1.2;
      }

      .value {
        font-size: 16px;
        line-height: 1.2;
      }

      .value-sm {
        font-size: 12px;
        line-height: 1.25;
      }

      .value-lg {
        font-size: 18px;
        line-height: 1.2;
      }

      .row-2col {
        gap: 8px;
        margin-bottom: 5px;
      }

      .date-value {
        font-size: 20px;
        line-height: 1.15;
      }

      .field[style] {
        margin-top: 8px !important;
      }

      .container,
      .container * {
        break-inside: avoid-page;
        page-break-inside: avoid;
      }
    }
  </style>
</head>

<body>
  <div class="container" style="max-width:480px;">

    <div class="title">รับเสื้อเวลา  9.00-18.30 น. เท่านั้น</div>

    <div class="header-row">
      <span class="header-left">ใบรับเสื้อร้านด้ายเงิน</span>
      <span class="header-right" id="iddata">เลขที่</span>
    </div>

    <div class="field">
      <div class="label">ชื่อ-สกุล</div>
      <div class="value" id="info1"></div>
    </div>

    <div class="field">
      <div class="label">ชื่อเล่น/Eng</div>
      <div class="value-sm" id="info3"></div>
    </div>

    <div class="field">
      <div class="label">โรงเรียน</div>
      <div class="value-lg" id="info4"></div>
    </div>

    <div class="row-2col">
      <div class="field">
        <div class="label">ชั้น</div>
        <div class="value-sm" id="info5"></div>
      </div>
      <div class="field">
        <div class="label">เลขประจำตัว</div>
        <div class="value-sm" id="info6"></div>
      </div>
    </div>

    <div class="row-2col">
      <div class="field">
        <div class="label">เสื้อ น.ร.</div>
        <div class="value-sm" id="info7"></div>
      </div>
      <div class="field">
        <div class="label">พละ</div>
        <div class="value-sm" id="info8"></div>
      </div>
    </div>

    <div class="field">
      <div class="label">เสื้ออื่นๆ</div>
      <div class="value-sm" id="info9"></div>
    </div>

    <div class="field" style="margin-top:20px;">
      <div class="label">รายละเอียด</div>
      <div class="value-sm" id="info12"></div>
    </div>

    <div class="field" style="margin-top:20px;">
      <div class="label">เบอร์ติดต่อ</div>
      <div class="value-sm" id="info10"></div>
    </div>

    <div class="field" style="margin-top:12px;">
      <div class="label">นัดรับวันที่</div>
      <div class="date-value" id="info11"></div>
    </div>

  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $(document).ready(function () {
      function getQueryParams() {
        let params = {}
        const query = window.location.search.substring(1)

        if (!query) {
          return params
        }

        query.split("&").forEach(function (part) {
          if (!part) {
            return
          }

          const item = part.split("=")
          const key = item[0]
          const rawValue = item.length > 1 ? item.slice(1).join("=") : ""

          if (!key) {
            return
          }

          params[key] = decodeURIComponent(rawValue.replace(/\+/g, " "))
        })

        return params
      }

      let queryParams = getQueryParams()
      const getValue = (key) => queryParams[key] || ''

      const fullName = [getValue('info1'), getValue('info2')].filter(Boolean).join(' ')

      $('#info1').text(fullName)
      $('#info3').text(getValue('info3'))
      $('#info4').text(getValue('info4'))
      $('#info5').text(getValue('info5'))
      $('#info6').text(getValue('info6'))
      $('#info7').text(getValue('info7'))
      $('#info8').text(getValue('info8'))
      const info9type = getValue('info9')
      const info9qty = getValue('info9qty')
      const info9other = getValue('info9other')
      const info9display = info9type ? ((info9type === 'อื่นๆ' ? info9other : info9type) + (info9qty ? ' ' + info9qty : '')) : ''
      $('#info9').text(info9display)
      $('#info10').text(getValue('info10'))
      $('#info11').text(convertToThaiDate(getValue('info11')))
      $('#info12').text(getValue('info12'))
      $('#iddata').text(getValue('iddata'))

      window.print()
      window.onafterprint = function () {
        // window.location.href = window.location.origin
      }
    })

    function convertToThaiDate(isoDate) {
      if (!isoDate || !isoDate.includes('-')) {
        return ''
      }

      const thaiMonths = ['มกราคม', 'กุมภาพันธ์', 'มีนาคม', 'เมษายน', 'พฤษภาคม', 'มิถุนายน', 'กรกฎาคม', 'สิงหาคม', 'กันยายน', 'ตุลาคม', 'พฤศจิกายน', 'ธันวาคม'];

      const [year, month, day] = isoDate.split('-');
      if (!year || !month || !day) {
        return ''
      }

      const thaiYear = parseInt(year) + 543;
      const thaiMonth = thaiMonths[parseInt(month) - 1];
      if (!thaiMonth || Number.isNaN(thaiYear)) {
        return ''
      }

      const thaiDate = `${day} ${thaiMonth} ${thaiYear}`;

      return thaiDate;
    }

  </script>
</body>

</html>
