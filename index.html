<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="style.css" rel="stylesheet" type="text/css" />

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"></script>

  <script
    src="https://cdn.jsdelivr.net/npm/gasparesganga-jquery-loading-overlay@2.1.7/dist/loadingoverlay.min.js"></script>
  <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/sweetalert2@11"></script>


  <title>ร้านด้ายเงิน รับปักเสื้อ</title>
  <!-- <link rel="icon" type="image/png" href="free-logo.jpg"> -->
</head>

<body>
  <main>
    <section class="text-center container py-4">
      <div class="row py-lg-5">
        <div class="col-lg-6 col-md-8 mx-auto">
          <h1 class="fw-light">ร้านด้ายเงิน รับปักเสื้อ</h1>
        </div>
      </div>
    </section>
    <div class="container">
      <div class="row">
        <form id="myForm" class="needs-validation row g-3" novalidate>
          <div class="col-md-4">
            <label for="info1" class="form-label">ชื่อจริง</label>
            <input type="text" class="form-control" placeholder="ระบุชื่อ" id="info1" name="info1" required>
          </div>

          <div class="col-md-4">
            <label for="info2" class="form-label">นามสกุล</label>
            <input type="text" class="form-control" placeholder="ระบุนามสกุล" id="info2" name="info2" required>
          </div>

          <div class="col-md-4">
            <label for="info3" class="form-label">ชื่อเล่น</label>
            <input type="text" class="form-control" placeholder="ระบุชื่อเล่น" id="info3" name="info3">
          </div>

          <div class="col-md-4">
            <label for="info4" class="form-label">โรงเรียน</label>
            <input type="text" class="form-control" placeholder="ระบุโรงเรียน" list="schooldata" id="info4" name="info4"
              required>
            <datalist id="schooldata">
            </datalist>
          </div>

          <div class="col-md-4">
            <label for="info5" class="form-label">ชั้น</label>
            <input type="text" class="form-control" placeholder="ระบุชั้นปี" id="info5" name="info5" required>
          </div>

          <div class="col-md-4">
            <label for="info6" class="form-label">เลขประจำตัว</label>
            <input type="text" class="form-control" placeholder="ระบุเลขประจำตัว" inputmode="numeric" id="info6"
              name="info6">

          </div>

          <div class="col-md-4">
            <label for="info7" class="form-label">เสื้อนักเรียน</label>
            <input type="text" class="form-control" inputmode="numeric" placeholder="ระบุจำนวนชุด" id="info7"
              name="info7" required>
          </div>

          <div class="col-md-4">
            <label for="info8" class="form-label">เสื้อพละ</label>
            <input type="text" class="form-control" inputmode="numeric" id="info8" name="info8"
              placeholder="ระบุจำนวนชุด" required>
          </div>

          <div class="col-md-4">
            <label for="info9" class="form-label">เสื้ออื่นๆ</label>
            <input type="text" class="form-control" inputmode="numeric" id="info9" name="info9"
              placeholder="ระบุจำนวนชุด" required>
          </div>

          <div class="col-md-4">
            <label for="info10" class="form-label">เบอร์ติดต่อ</label>
            <input type="text" class="form-control" inputmode="numeric" maxlength="10" minlength="10" id="info10"
              name="info10" placeholder="0xxxxxxxxx" required>
          </div>

          <div class="col-md-4">
            <label for="info11" class="form-label">นัดรับเสื้อวันที่</label>
            <input type="date" class="form-control" id="info11" name="info11" required>
          </div>

          <div class="col-md-4">
            <label for="info12" class="form-label">หมายเหตุ</label>
            <textarea type="text" class="form-control" placeholder="หากมี" id="info12" name="info12"
              rows="3"></textarea>
          </div>

          <div class="col-md-12">
            <button class="w-100 btn btn btn-primary" type="submit">บันทึกข้อมูล</button>
          </div>
        </form>

      </div>
    </div>
  </main>
  <script src="script.js"></script>

</body>

</html>
